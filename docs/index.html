<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZVA+</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }

        .logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 40px;
        }

        .button-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        @media (max-width: 400px) {
            .button-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <!-- Dein Logo -->
    <img src="logo-200x130.png" alt="Logo" class="logo">

    <!-- Buttons als Links zu den Unterseiten -->
    <div class="button-container">
        <a href="de.html" class="btn">DE</a>
        <a href="en.html" class="btn">EN</a>
    </div>

</body>
</html>
