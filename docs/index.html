<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZVA+</title>
    <style>
        :root {
            --primary-color: #007bff; /* Deine Buttonfarbe */
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            color: var(--text-color);
            padding: 20px;
        }

        .logo {
            max-width: 120px;
            height: auto;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 30px; }

        .button-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }

        /* Sprach-Umschaltung */
        .lang-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <img src="logo-200x130.png" alt="Logo" class="logo">

    <!-- Textelemente -->
    <div id="content-de" class="lang-content active">
        <h1>ZVA+</h1>
    </div>
    <div id="content-en" class="lang-content">
        <h1>Welcome to the test area of ZVA+.</h1>
    </div>

    <!-- Buttons -->
    <div class="button-container">
        <button class="btn" onclick="setLanguage('de')">DE</button>
        <button class="btn" onclick="setLanguage('en')">EN</button>
    </div>

    <script>
        function setLanguage(lang) {
            // Alle Sprachcontainer verstecken
            document.querySelectorAll('.lang-content').forEach(el => {
                el.classList.remove('active');
            });
            // Gewünschte Sprache zeigen
            document.getElementById('content-' + lang).classList.add('active');
            
            // Optional: Sprache im HTML-Tag anpassen
            document.documentElement.lang = lang;
        }
    </script>

</body>
</html>
